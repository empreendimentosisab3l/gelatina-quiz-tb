  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>

    <!-- RedTrack InitiateCheckout Postback -->
    <script>
    document.addEventListener('DOMContentLoaded', function() {
      var urlParams = new URLSearchParams(window.location.search);
      var clickid = urlParams.get('rtkcid');

      if (clickid) {
        console.log('RedTrack ClickID encontrado: ' + clickid);

        // Observer para SPA - detecta quando botoes .smartplayer-click-event aparecem
        var attachIC = function() {
          document.querySelectorAll('.smartplayer-click-event').forEach(function(link) {
            if (link.dataset.icAttached) return;
            link.dataset.icAttached = 'true';
            link.addEventListener('click', function() {
              var postbackURL = 'https://red.track.tb.monjarogelatina.shop/postback?clickid=' + clickid + '&type=InitiateCheckout';
              fetch(postbackURL, { method: 'GET' })
                .then(function(r) { console.log('RedTrack IC disparado para ClickID: ' + clickid, r); })
                .catch(function(e) { console.error('Erro ao disparar IC:', e); });
            });
          });
        };

        attachIC();
        var icObserver = new MutationObserver(function() { setTimeout(attachIC, 200); });
        icObserver.observe(document.body || document.documentElement, { childList: true, subtree: true });
      } else {
        console.warn('RedTrack: ClickID (rtkcid) nao encontrado na URL. IC nao sera disparado.');
      }
    });
    </script>

    <!-- UTM Passthrough: salva UTMs e propaga para links externos -->
    <script>
    !(function () {
      var UTM_KEYS = ['utm_source','utm_medium','utm_campaign','utm_content','utm_term','xcod'];

      // Salvar UTMs da URL no localStorage
      var urlParams = new URLSearchParams(window.location.search);
      urlParams.forEach(function(value, key) {
        var normalizedKey = key.endsWith('_mnr') ? key.replace(/_mnr$/, '') : key;
        if (UTM_KEYS.indexOf(normalizedKey) !== -1) {
          localStorage.setItem(normalizedKey, value);
        }
      });

      // Propagar UTMs para links externos (observer para SPA)
      var appendUtmsToLinks = function() {
        var links = document.querySelectorAll('a[href]');
        links.forEach(function(link) {
          try {
            var url = new URL(link.href, window.location.origin);
            if (url.origin !== window.location.origin) {
              UTM_KEYS.forEach(function(key) {
                var stored = localStorage.getItem(key);
                if (stored) url.searchParams.set(key, stored);
              });
              link.href = url.toString();
            }
          } catch(e) {}
        });
      };

      // Propagar params da URL original para links externos
      var passQueryParams = function() {
        var qs = new URLSearchParams(window.location.search);
        if (!qs.toString()) return;
        var links = document.querySelectorAll('a[href]');
        links.forEach(function(link) {
          if (link.href.includes('#')) return;
          try {
            var u = new URL(link.href);
            var q = new URLSearchParams(u.search);
            for (var pair of qs.entries()) {
              if (!q.has(pair[0])) q.set(pair[0], pair[1]);
            }
            u.search = q.toString();
            link.href = u.toString();
          } catch(e) {}
        });
      };

      // Rodar ao carregar e observar mudancas no DOM (SPA)
      var run = function() {
        appendUtmsToLinks();
        passQueryParams();
      };
      document.addEventListener('DOMContentLoaded', run);
      var observer = new MutationObserver(function() { setTimeout(run, 100); });
      observer.observe(document.body || document.documentElement, { childList: true, subtree: true });
    })();
    </script>
  </body>
</html>
